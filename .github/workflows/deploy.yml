name: Deploy to Cloudflare Pages

# Builds and deploys on every push to main, plus a manual trigger.
# Requires two repository secrets (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN  - a token with "Cloudflare Pages: Edit" AND "D1: Edit"
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id
# Migrations run before deploy. wrangler only applies pending migrations, so it is
# a no-op when there are none. Keep migrations additive (backward compatible),
# since the currently deployed code briefly runs against the new schema.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit -- --run
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply keel-prod --remote

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name keel
