name: Harbour reminders

# Cloudflare Pages has no native cron, so an hourly GitHub schedule pings a
# secured endpoint. The endpoint only sends to users who are due this cycle and
# is idempotent, so hourly runs never double-send or nag daily.
on:
  schedule:
    - cron: '0 * * * *' # hourly, on the hour (UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Harbour reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Skip (don't fail the run) until the CRON_SECRET repo secret is set.
          # Add it under Settings > Secrets and variables > Actions, matching the
          # CRON_SECRET Pages secret. Without it the endpoint correctly returns 401.
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set; skipping the Harbour reminder ping."
            exit 0
          fi
          curl -fsS -X POST "https://keel-aba.pages.dev/api/cron/harbour" \
            -H "x-cron-key: $CRON_SECRET" \
            -H "content-type: application/json"
