<!doctype html>
<html lang="en-IN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAF7F1" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0C2340" />
		<meta name="author" content="Annapurna Labs" />
		<meta name="description" content="A forgiving expense tracker." />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Keel" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="icon" type="image/png" href="/icons/favicon-48.png" />

		<!-- Preload Fraunces variable font for hero figures (CLS = 0 with size-adjust) -->
		<link
			rel="preload"
			href="/fonts/Fraunces-VariableFont.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
